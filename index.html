<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异宠种草文案改写</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #A29BFE;
    --bg: #F8F9FC;
    --card: #FFFFFF;
    --text: #2D3436;
    --text-light: #636E72;
    --border: #DFE6E9;
    --success: #00B894;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 6px;
  }
  header p {
    font-size: 14px;
    color: var(--text-light);
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .icon-input { background: #DFE6E9; }
  .icon-output { background: #E8F5E9; }
  .icon-config { background: #FFF3E0; }
  textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
    font-family: inherit;
    color: var(--text);
    background: #FAFBFD;
  }
  textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    background: #fff;
  }
  textarea::placeholder { color: #B2BEC3; }
  #rawText { min-height: 180px; }
  #outputText {
    min-height: 180px;
    background: #F0FFF4;
    border-color: #C6F6D5;
    cursor: default;
  }
  .config-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .config-row label {
    font-size: 13px;
    color: var(--text-light);
    white-space: nowrap;
  }
  .config-row input {
    flex: 1;
    min-width: 200px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    transition: border-color 0.2s;
    color: var(--text);
    background: #FAFBFD;
  }
  .config-row input:focus {
    outline: none;
    border-color: var(--primary-light);
    background: #fff;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 4px;
  }
  .btn {
    padding: 12px 36px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: #5A4BD1; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled {
    background: var(--primary-light);
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: #F1F2F6;
    color: var(--text);
  }
  .btn-secondary:hover { background: #E4E6EB; }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    margin-top: 12px;
    min-height: 20px;
  }
  .status.error { color: #E17055; }
  .status.success { color: var(--success); }
  .hint {
    font-size: 12px;
    color: #B2BEC3;
    margin-top: 8px;
    line-height: 1.5;
  }
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #2D3436;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) {
    body { padding: 16px 12px; }
    .card { padding: 18px; }
    header h1 { font-size: 22px; }
    .btn { padding: 11px 24px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🦎 异宠种草文案改写</h1>
    <p>粘贴原始产品文案，一键改写为种草风格</p>
  </header>

  <div class="card">
    <div class="card-title">
      <span class="icon icon-config">⚙</span>
      API 配置
    </div>
    <div class="config-row">
      <label>豆包 API Key：</label>
      <input type="password" id="apiKey" placeholder="输入你的火山引擎 API Key" />
    </div>
    <div class="hint">
      API Key 仅保存在本地浏览器，不会上传到任何服务器。<br>
      获取方式：登录 <a href="https://console.volcengine.com/ark" target="_blank" style="color:var(--primary)">火山引擎方舟平台</a> → API Key 管理 → 创建
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="icon icon-input">✏</span>
      原始文案
    </div>
    <textarea id="rawText" placeholder="在此粘贴原始产品文案..."></textarea>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="rewriteBtn" onclick="handleRewrite()">
      ✨ 开始改写
    </button>
    <button class="btn btn-secondary" onclick="copyOutput()">
      📋 复制结果
    </button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" style="margin-top: 20px;">
    <div class="card-title">
      <span class="icon icon-output">📝</span>
      改写结果
    </div>
    <textarea id="outputText" readonly placeholder="改写后的文案将显示在这里..."></textarea>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SYSTEM_PROMPT = `你是一位资深异宠种草博主，擅长将产品文案改写为适合社交媒体传播的种草内容。

写作要求：
1. 风格适配：融合小红书短句生活化表达与头条资讯的专业文风，语句简洁有节奏感
2. 内容规范：严禁出现任何医疗功效宣称、批发/采购硬广话术，不涉及治疗效果
3. 语言基调：严谨务实不浮夸，用真实体验感打动读者，避免过度营销用语
4. 输出格式：只输出改写后的成品文案，不加任何解释、闲聊、前言或备注`;

async function handleRewrite() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const rawText = document.getElementById('rawText').value.trim();
  const btn = document.getElementById('rewriteBtn');
  const status = document.getElementById('status');
  const output = document.getElementById('outputText');

  if (!apiKey) {
    setStatus('请先填写 API Key', 'error');
    return;
  }
  if (!rawText) {
    setStatus('请先粘贴原始文案', 'error');
    return;
  }

  // Save API key locally
  localStorage.setItem('doubao_api_key', apiKey);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 改写中...';
  setStatus('正在调用豆包模型改写...');
  output.value = '';

  try {
    const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'doubao-1-5-thinking-250415',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: rawText }
        ],
        temperature: 0.7,
        max_tokens: 2000
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `API 请求失败 (${response.status})`);
    }

    const data = await response.json();
    const result = data.choices?.[0]?.message?.content || '未获取到改写结果';
    output.value = result;
    setStatus('改写完成 ✓', 'success');
    showToast('改写完成！');
  } catch (err) {
    setStatus('改写失败：' + err.message, 'error');
    console.error('Rewrite error:', err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 开始改写';
  }
}

function copyOutput() {
  const output = document.getElementById('outputText');
  if (!output.value) {
    showToast('暂无内容可复制');
    return;
  }
  navigator.clipboard.writeText(output.value).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    output.select();
    document.execCommand('copy');
    showToast('已复制到剪贴板');
  });
}

function setStatus(text, type) {
  const status = document.getElementById('status');
  status.textContent = text;
  status.className = 'status' + (type ? ' ' + type : '');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Restore API key on load
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('doubao_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
});
</script>

</body>
</html>

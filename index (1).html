<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异宠种草文案改写</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #F0EEFF;
    --primary-dark: #5A4BD1;
    --bg: #F8F9FA;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --text-secondary: #777;
    --border: #E8E8E8;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --radius: 14px;
    --success: #00B894;
    --error: #E74C3C;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
  .header p { font-size: 14px; color: var(--text-secondary); }
  .container { width: 100%; max-width: 680px; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 18px; }
  textarea {
    width: 100%;
    min-height: 160px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
    font-family: inherit;
    color: var(--text);
    background: #FAFAFA;
  }
  textarea:focus { outline: none; border-color: var(--primary); background: #fff; }
  textarea::placeholder { color: #bbb; }
  .output-area {
    width: 100%;
    min-height: 160px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    background: #F0FFF4;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    transition: border-color 0.3s;
  }
  .output-area.empty { background: #FAFAFA; color: #bbb; }
  .output-area.error { border-color: var(--error); background: #FFF5F5; }
  .output-area.loading { display: flex; align-items: center; gap: 10px; color: var(--primary); }
  .btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    flex: 1;
    min-width: 120px;
    padding: 13px 20px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary { background: var(--primary-light); color: var(--primary); }
  .btn-secondary:hover { background: #E4E0FF; }
  .btn-small { padding: 8px 16px; font-size: 13px; border-radius: 8px; min-width: auto; flex: none; }

  /* API Key 设置 */
  .settings-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .settings-toggle .arrow { transition: transform 0.2s; font-size: 12px; color: var(--text-secondary); }
  .settings-toggle .arrow.open { transform: rotate(180deg); }
  .settings-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .settings-body.open { max-height: 400px; }
  .settings-body .inner { padding-top: 14px; }
  .input-row { display: flex; gap: 10px; align-items: center; }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  .input-row input:focus { outline: none; border-color: var(--primary); }
  .hint { font-size: 12px; color: var(--text-secondary); margin-top: 8px; line-height: 1.6; }
  .hint a { color: var(--primary); }

  /* 模型选择 */
  .model-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  .model-row label { font-size: 13px; font-weight: 500; white-space: nowrap; }
  .model-row select {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    cursor: pointer;
  }
  .model-row select:focus { outline: none; border-color: var(--primary); }

  /* 加载动画 */
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #333; color: #fff;
    padding: 10px 24px; border-radius: 8px;
    font-size: 14px; transition: transform 0.3s ease;
    z-index: 999; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .char-count { text-align: right; font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .output-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

  @media (max-width: 500px) {
    body { padding: 16px 10px 40px; }
    .card { padding: 18px; }
    .header h1 { font-size: 22px; }
    textarea, .output-area { min-height: 130px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🦎 异宠种草文案改写</h1>
  <p>粘贴原始产品文案，一键生成种草风格文案</p>
</div>

<div class="container">
  <!-- API Key 设置 -->
  <div class="card">
    <div class="settings-toggle" onclick="toggleSettings()">
      <span class="card-title" style="margin-bottom:0">
        <span class="icon">🔑</span> API 配置
      </span>
      <span class="arrow" id="arrow">▼</span>
    </div>
    <div class="settings-body" id="settingsBody">
      <div class="inner">
        <label style="font-size:13px;font-weight:500;margin-bottom:6px;display:block;">豆包 API Key</label>
        <div class="input-row">
          <input type="password" id="apiKeyInput" placeholder="输入你的豆包 API Key">
          <button class="btn btn-secondary btn-small" onclick="saveKey()">保存</button>
        </div>

        <div class="model-row">
          <label>模型选择：</label>
          <select id="modelSelect" onchange="saveModel()">
            <option value="doubao-1-5-pro-32k-250115">豆包 1.5 Pro (32K)</option>
            <option value="doubao-1-5-lite-32k-250428">豆包 1.5 Lite (32K)</option>
            <option value="doubao-1-5-pro-256k-250115">豆包 1.5 Pro (256K)</option>
            <option value="doubao-1-5-vision-pro-32k-250115">豆包 1.5 Vision Pro (32K)</option>
          </select>
        </div>

        <p class="hint">
          密钥仅保存在本地浏览器，不会上传到任何服务器。<br>
          获取方式：登录 <a href="https://console.volcengine.com/ark" target="_blank">火山引擎方舟平台</a> → API Key 管理 → 创建<br>
          请确保你在方舟平台已开通对应模型的使用权限
        </p>
      </div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="card">
    <div class="card-title"><span class="icon">📝</span> 原始文案</div>
    <textarea id="rawText" placeholder="在此粘贴原始产品文案，例如：&#10;&#10;【品名】豹纹守宫 超级雪花&#10;【价格】380元&#10;【特点】温顺亲人，花色独特，适合新手饲养&#10;【饲养要求】温度28-32度，需补钙粉..."></textarea>
    <div class="char-count"><span id="inputCount">0</span> 字</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="rewriteBtn" onclick="rewrite()">
        ✨ 开始改写
      </button>
      <button class="btn btn-secondary" id="copyBtn" style="display:none;" onclick="copyOutput()">
        📋 复制结果
      </button>
    </div>
  </div>

  <!-- 输出区 -->
  <div class="card">
    <div class="card-title"><span class="icon">✨</span> 改写结果</div>
    <div class="output-area empty" id="outputArea">改写后的文案将显示在这里...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DOUBAO_API_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';

const SYSTEM_PROMPT = `你是一位专业的异宠种草博主，擅长将普通产品文案改写为吸引人的种草内容。

【写作风格要求】
1. 适配小红书短句生活化风格：短句为主，节奏轻快，口语化，有画面感
2. 同时融合头条资讯文风：信息密度适中，有干货，有知识点
3. 善用 emoji 点缀（不过度），增加阅读趣味
4. 适当加入个人体验感和推荐语气，但保持真实不夸张
5. 结构清晰：可以用分段、小标题或编号让信息一目了然

【严格禁止】
- 禁止使用医疗/治疗/药效等硬广话术
- 禁止使用批发/工厂/低价促销等商业硬广用语
- 禁止虚假宣传或夸大产品功效
- 禁止添加任何解释性文字、前言后语或闲聊内容

【输出要求】
只输出改写后的成品文案，不加任何解释、说明、前缀或后缀。直接给出可以直接发布的文案。`;

// ============ UI 逻辑 ============
const rawTextEl = document.getElementById('rawText');
const outputArea = document.getElementById('outputArea');
const rewriteBtn = document.getElementById('rewriteBtn');
const copyBtn = document.getElementById('copyBtn');
const inputCount = document.getElementById('inputCount');
const toast = document.getElementById('toast');

rawTextEl.addEventListener('input', () => { inputCount.textContent = rawTextEl.value.length; });

window.addEventListener('DOMContentLoaded', () => {
  const savedKey = localStorage.getItem('doubao_api_key');
  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
  const savedModel = localStorage.getItem('doubao_model');
  if (savedModel) document.getElementById('modelSelect').value = savedModel;
  if (!savedKey) toggleSettings(true);
});

function toggleSettings(forceOpen) {
  const body = document.getElementById('settingsBody');
  const arrow = document.getElementById('arrow');
  const isOpen = body.classList.contains('open');
  if (forceOpen === true || !isOpen) { body.classList.add('open'); arrow.classList.add('open'); }
  else { body.classList.remove('open'); arrow.classList.remove('open'); }
}

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { showToast('请输入 API Key'); return; }
  localStorage.setItem('doubao_api_key', key);
  showToast('✅ API Key 已保存');
  toggleSettings(false);
}

function saveModel() {
  localStorage.setItem('doubao_model', document.getElementById('modelSelect').value);
  showToast('✅ 模型已切换');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function copyOutput() {
  const text = outputArea.textContent;
  if (!text || outputArea.classList.contains('empty')) return;
  navigator.clipboard.writeText(text).then(() => showToast(' 已复制到剪贴板'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('📋 已复制到剪贴板');
    });
}

// ============ 核心改写逻辑 ============
async function rewrite() {
  const rawText = rawTextEl.value.trim();
  if (!rawText) { showToast('请先粘贴原始文案'); return; }

  const apiKey = localStorage.getItem('doubao_api_key');
  if (!apiKey) { showToast('请先设置 API Key'); toggleSettings(true); return; }

  const model = document.getElementById('modelSelect').value;

  rewriteBtn.disabled = true;
  rewriteBtn.innerHTML = '<span class="spinner"></span> 改写中...';
  outputArea.classList.remove('empty', 'error');
  outputArea.classList.add('loading');
  outputArea.innerHTML = '<span class="spinner"></span> 正在改写，请稍候...';
  copyBtn.style.display = 'none';

  try {
    const response = await fetch(DOUBAO_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: rawText }
        ],
        temperature: 0.85,
        top_p: 0.9,
        max_tokens: 2000
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      const errMsg = errData?.error?.message || ('HTTP ' + response.status);
      throw new Error(errMsg);
    }

    const data = await response.json();
    const result = data.choices?.[0]?.message?.content;
    if (!result) throw new Error('未获取到改写结果，请重试');

    outputArea.classList.remove('loading');
    outputArea.textContent = result;
    copyBtn.style.display = 'flex';

  } catch (err) {
    outputArea.classList.remove('loading');
    outputArea.classList.add('error');
    outputArea.textContent = '❌ ' + err.message;
  } finally {
    rewriteBtn.disabled = false;
    rewriteBtn.innerHTML = '✨ 开始改写';
  }
}
</script>

</body>
</html>
